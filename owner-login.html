<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner Login | BashaKhuji</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyA-nmR9szA415d_qX16fbMX8-lDMa-zrU4",
    authDomain: "bashakhuji-503d1.firebaseapp.com",
    projectId: "bashakhuji-503d1",
    storageBucket: "bashakhuji-503d1.firebasestorage.app",
    messagingSenderId: "697249288857",
    appId: "1:697249288857:web:76987e2b2ab10f90005e08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  async function ownerLogin(e) {
    e.preventDefault();

    const email = document.getElementById("ownerEmail").value;
    const password = document.getElementById("ownerPass").value;
    const btn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    btn.textContent = "Logging in...";
    btn.disabled = true;
    errorMsg.textContent = "";

    try {
      // Firebase দিয়ে login করো
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Firestore এ check করো এই user টা owner কিনা
      const ownerDoc = await getDoc(doc(db, "owners", user.uid));

      if (ownerDoc.exists()) {
        // Owner verified! Dashboard এ নিয়ে যাও
        window.location.href = "owner-dashboard.html";
      } else {
        auth.signOut();
        errorMsg.textContent = "❌ You are not registered as an owner.";
        btn.textContent = "Login";
        btn.disabled = false;
      }
    } catch (error) {
      let msg = "❌ Something went wrong.";
      if (error.code === "auth/user-not-found") msg = "❌ Email not found.";
      if (error.code === "auth/wrong-password") msg = "❌ Wrong password.";
      if (error.code === "auth/invalid-credential") msg = "❌ Invalid email or password.";
      errorMsg.textContent = msg;
      btn.textContent = "Login";
      btn.disabled = false;
    }
  }

  // Form এ event listener লাগাও
  document.getElementById("ownerLoginForm").addEventListener("submit", ownerLogin);

</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      min-height:100vh;
      background:
        linear-gradient(rgba(15,23,42,.7),rgba(15,23,42,.7)),
        url("https://images.unsplash.com/photo-1570129477492-45c003edd2be");
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-container{
      width:380px;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(12px);
      padding:38px;
      border-radius:20px;
      box-shadow:0 30px 70px rgba(0,0,0,.45);
      text-align:center;
    }

    .icon{
      font-size:48px;
      color:#0f172a;
      margin-bottom:10px;
    }

    h2{margin-bottom:6px}
    p{font-size:14px;color:#666;margin-bottom:28px}

    .input-box{text-align:left;margin-bottom:18px}
    label{font-size:14px;font-weight:500}

    .input-wrapper{position:relative}

    input{
      width:100%;
      padding:13px 42px 13px 13px;
      margin-top:6px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    input:focus{border-color:#0f172a}

    .eye{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      color:#666;
    }

    .options{
      text-align:right;
      margin-bottom:22px;
      font-size:13px;
    }

    .options a{
      color:#5e8aef;
      font-weight:500;
      text-decoration:none;
    }

  button{
  width:100%;
  padding:13px;
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow: 0 4px 18px rgba(15,23,42,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

button::after{
  content:'';
  position:absolute;
  top:-50%;
  left:-60%;
  width:45%;
  height:200%;
  background:rgba(255,255,255,0.18);
  transform:skewX(-20deg);
  animation: shine 2s infinite;
}

@keyframes shine{
  0%  { left:-60%; }
  100%{ left:130%; }
}

button:hover{
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 28px rgba(15,23,42,0.55);
}

button:active{
  transform: translateY(0px) scale(0.99);
}

    button:hover{background:#014120}

    .register{
      margin-top:18px;
      font-size:14px;
    }

    .register a{
      color:#4676e4;
      font-weight:500;
      text-decoration:none;
    }
  </style>
</head>
<body>

<div class="login-container">
  <i class="fa-solid fa-house-user icon"></i>
  <h2>Owner Login</h2>
  <p>Manage your properties securely</p>

  <form id="ownerLoginForm">
    <div class="input-box">
      <label>Email</label>
      <input type="email" id="ownerEmail" placeholder="Owner email" required>
    </div>

    <div class="input-box">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="ownerPass" placeholder="Password" required>
        <i class="fa-solid fa-eye eye" onclick="togglePass('ownerPass', this)"></i>
      </div>
    </div>

    <div class="options">
      <a href="owner-forgot-password.html">Forgot password?</a>
    </div>

    <p id="errorMsg" style="color:red; font-size:13px; margin-bottom:10px;"></p>
<button id="loginBtn">Login</button>
  </form>

  <div class="register">
    New owner? <a href="owner-register.html">Register property</a>
  </div>
</div>

<script>
function togglePass(id, icon){
  const input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    input.type = "password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}
</script>

</body>
</html>
