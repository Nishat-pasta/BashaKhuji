<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Properties | BashaKhuji</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #f4f6f8; color: #333; }

    /* Sidebar */
    .sidebar {
      width: 240px; height: 100vh; background: #2c2f36;
      position: fixed; left: 0; top: 0; padding: 30px 20px;
    }
    .sidebar h2 { color: #fff; margin-bottom: 40px; text-align: center; }
    .sidebar a {
      display: block; color: #ddd; text-decoration: none;
      margin-bottom: 20px; font-size: 15px; transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active { color: #fff; padding-left: 8px; }

    /* Main */
    .main { margin-left: 240px; padding: 30px; }

    .top-bar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 30px;
    }
    .top-bar h1 { font-size: 24px; font-weight: 600; }
    .logout-btn {
      background: #444; color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
    }

    /* Loading / Empty */
    .state-msg {
      text-align: center; padding: 60px 20px;
      color: #999; font-size: 15px;
    }
    .state-msg span { font-size: 36px; display: block; margin-bottom: 10px; }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .prop-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .prop-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    /* Card image area */
    .card-img {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, #2c2f36 0%, #444b56 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; position: relative;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* Status badge on card */
    .card-badge {
      position: absolute; top: 12px; right: 12px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    }
    .card-badge.available { background: #e0f7ea; color: #2e7d32; }
    .card-badge.rented    { background: #fce4ec; color: #c62828; }
    .card-badge.pending   { background: #fff8e1; color: #f57f17; }

    /* Card body */
    .card-body { padding: 18px 20px; }

    .card-title {
      font-size: 16px; font-weight: 600;
      color: #1a1f36; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-meta {
      display: flex; flex-direction: column; gap: 5px;
      margin-bottom: 14px;
    }
    .card-meta span {
      font-size: 13px; color: #666;
      display: flex; align-items: center; gap: 6px;
    }

    .card-rent {
      font-size: 18px; font-weight: 700;
      color: #2c2f36; margin-bottom: 16px;
    }
    .card-rent small {
      font-size: 12px; font-weight: 400; color: #999;
    }

    .card-footer {
      display: flex; gap: 8px;
    }

    .btn-view {
      flex: 1; background: #2c2f36; color: white;
      border: none; padding: 9px 0; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: 'Poppins', sans-serif;
      transition: background 0.2s;
    }
    .btn-view:hover { background: #444; }

    .btn-edit {
      flex: 1; background: transparent; color: #2c2f36;
      border: 1.5px solid #2c2f36; padding: 9px 0; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: 'Poppins', sans-serif;
      transition: 0.2s;
    }
    .btn-edit:hover { background: #f0f0f0; }

    @media(max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-nmR9szA415d_qX16fbMX8-lDMa-zrU4",
      authDomain: "bashakhuji-503d1.firebaseapp.com",
      projectId: "bashakhuji-503d1",
      storageBucket: "bashakhuji-503d1.firebasestorage.app",
      messagingSenderId: "697249288857",
      appId: "1:697249288857:web:76987e2b2ab10f90005e08"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "owner-login.html";
        return;
      }

      const container = document.getElementById("propsContainer");

      try {
        const q = query(
          collection(db, "properties"),
          where("ownerUid", "==", user.uid)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `
            <div class="state-msg">
              <span>🏠</span>
              No properties added yet.<br>
              <a href="add-property-owner.html" style="color:#2c2f36;font-weight:600;text-decoration:underline;">Add your first property →</a>
            </div>`;
          return;
        }

        let html = '<div class="cards-grid">';

        snap.forEach((docSnap) => {
          const p   = docSnap.data();
          const id  = docSnap.id;

          const status = p.status || "pending";
          let badgeClass = "pending", badgeLabel = "Pending";
          if (status === "available" || status === "approved") {
            badgeClass = "available"; badgeLabel = "Available";
          } else if (status === "rented") {
            badgeClass = "rented"; badgeLabel = "Rented";
          }

          const location = [p.area, p.district].filter(Boolean).join(", ") || "—";
          const rent     = p.rent ? "৳ " + Number(p.rent).toLocaleString("en-BD") : "—";
          const type     = p.type || p.propertyType || "";

          // Image or emoji fallback
          const imgHtml = p.imageUrl
            ? `<img src="${p.imageUrl}" alt="${p.title || ''}" />`
            : `🏢`;

          html += `
            <div class="prop-card">
              <div class="card-img">
                ${imgHtml}
                <span class="card-badge ${badgeClass}">${badgeLabel}</span>
              </div>
              <div class="card-body">
                <div class="card-title">${p.title || "Untitled Property"}</div>
                <div class="card-meta">
                  <span>📍 ${location}</span>
                  ${type ? `<span>🏠 ${type}</span>` : ""}
                  ${p.bedrooms ? `<span>🛏 ${p.bedrooms} Bedroom(s)</span>` : ""}
                </div>
                <div class="card-rent">
                  ${rent} <small>/ month</small>
                </div>
                <div class="card-footer">
                  <button class="btn-view" onclick="window.location.href='property-details.html?id=${id}'">View</button>
                  <button class="btn-edit" onclick="window.location.href='edit-property.html?id=${id}'">Edit</button>
                </div>
              </div>
            </div>`;
        });

        html += '</div>';
        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="state-msg"><span>⚠️</span>Failed to load properties. Please try again.</div>`;
      }
    });

    window.logout = async function () {
      await signOut(auth);
      window.location.href = "owner-login.html";
    };
  </script>
</head>
<body>

  <div class="sidebar">
    <h2>BashaKhuji</h2>
    <a href="owner-dashboard.html">Dashboard</a>
    <a href="my-properties-owner.html" class="active">My Properties</a>
    <a href="add-property-owner.html">Add Property</a>
    <a href="owner-requests.html">Requests</a>
  </div>

  <div class="main">
    <div class="top-bar">
      <h1>My Properties</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="propsContainer">
      <div class="state-msg"><span>⏳</span>Loading your properties...</div>
    </div>
  </div>

</body>
</html>
