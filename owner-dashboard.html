<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner Dashboard | BashaKhuji</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6f8;
      color: #333;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background: #2c2f36;
      position: fixed;
      left: 0;
      top: 0;
      padding: 30px 20px;
    }

    .sidebar h2 {
      color: #fff;
      margin-bottom: 40px;
      text-align: center;
    }

    .sidebar a {
      display: block;
      color: #ddd;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 15px;
      transition: 0.3s;
    }

    .sidebar a:hover, .sidebar a.active {
      color: #fff;
      padding-left: 8px;
    }

    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .top-bar h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .logout-btn {
      background: #444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .owner-info-card {
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .owner-info-card h3 {
      font-size: 14px;
      color: #777;
      margin-bottom: 12px;
    }

    .owner-info-card p {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }

    .owner-info-card p.name {
      font-size: 15px;
      font-weight: 600;
      color: #1a1f36;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .card h3 {
      font-size: 14px;
      color: #777;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 26px;
      font-weight: 600;
    }

    .actions {
      margin-bottom: 30px;
    }

    .actions button {
      background: #2c2f36;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      margin-right: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .actions button:hover {
      background: #444;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f1f1f1;
      font-weight: 500;
    }

    tr:not(:last-child) {
      border-bottom: 1px solid #eee;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge.available { background: #e0f7ea; color: #2e7d32; }
    .badge.rented    { background: #fce4ec; color: #c62828; }
    .badge.pending   { background: #fff8e1; color: #f57f17; }

    .btn-view {
      background: #2c2f36;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-view:hover { background: #444; }

    .empty-row td {
      text-align: center;
      color: #999;
      padding: 30px;
    }

    @media(max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>BashaKhuji</h2>
    <a href="owner-dashboard.html" class="active">Dashboard</a>
    <a href="my-properties-owner.html">My Properties</a>
    <a href="add-property-owner.html">Add Property</a>
    <a href="owner-requests.html">Requests</a>
  </div>

  <div class="main">

    <div class="top-bar">
      <h1 id="welcomeText">Loading...</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- Owner Info -->
    <div class="owner-info-card">
      <h3>👤 Owner Information</h3>
      <p class="name">📛 <span id="infoName">—</span></p>
      <p>📧 <span id="infoEmail">—</span></p>
      <p>📞 <span id="infoPhone">—</span></p>
      <p>🏠 <span id="infoAddress">—</span></p>
    </div>

    <!-- Stats -->
    <div class="cards">
      <div class="card">
        <h3>Total Properties</h3>
        <p id="statTotal">—</p>
      </div>
      <div class="card">
        <h3>Active Listings</h3>
        <p id="statActive">—</p>
      </div>
      <div class="card">
        <h3>New Requests</h3>
        <p id="statRequests">—</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button onclick="window.location.href='add-property-owner.html'">Add New Property</button>
      <button onclick="window.location.href='owner-requests.html'">View Requests</button>
    </div>

    <!-- Property Table -->
    <table>
      <thead>
        <tr>
          <th>Property Name</th>
          <th>Location</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="propTableBody">
        <tr class="empty-row"><td colspan="4">Loading...<\/td><\/tr>
      </tbody>
    </table>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-nmR9szA415d_qX16fbMX8-lDMa-zrU4",
      authDomain: "bashakhuji-503d1.firebaseapp.com",
      projectId: "bashakhuji-503d1",
      storageBucket: "bashakhuji-503d1.firebasestorage.app",
      messagingSenderId: "697249288857",
      appId: "1:697249288857:web:76987e2b2ab10f90005e08"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function loadDashboard() {
      const user = auth.currentUser;
      if (!user) return;

      // Owner info
      const ownerDoc = await getDoc(doc(db, "owners", user.uid));
      if (!ownerDoc.exists()) {
        window.location.href = "owner-login.html";
        return;
      }

      const data = ownerDoc.data();
      const firstName = data.firstName || data.firstname || "";
      const lastName = data.lastName || data.lastname || "";
      const fullName = firstName + " " + lastName;

      document.getElementById("welcomeText").textContent = "Welcome, " + (fullName.trim() || "Owner") + "!";
      document.getElementById("infoName").textContent = fullName.trim() || "—";
      document.getElementById("infoEmail").textContent = data.email || "—";
      document.getElementById("infoPhone").textContent = data.phone || "—";
      document.getElementById("infoAddress").textContent = (data.address || "") + (data.address && data.district ? ", " : "") + (data.district || "");

      // Properties
      const propQuery = query(collection(db, "properties"), where("ownerUid", "==", user.uid));
      const propSnap = await getDocs(propQuery);

      let total = 0;
      let active = 0;
      let tableHTML = "";

      propSnap.forEach((docSnap) => {
        const p = docSnap.data();
        total++;
        
        const status = p.status || "pending";
        if (status === "available" || status === "approved") active++;

        let badgeClass = "pending";
        let badgeLabel = "Pending";
        if (status === "available" || status === "approved") {
          badgeClass = "available";
          badgeLabel = "Available";
        } else if (status === "rented" || status === "unavailable") {
          badgeClass = "rented";
          badgeLabel = "Rented";
        }

        const location = [p.area, p.district].filter(Boolean).join(", ") || "—";

        tableHTML += `
          <tr>
            <td>${p.title || "—"}</td>
            <td>${location}</td>
            <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
            <td><button class="btn-view" onclick="window.location.href='property-details.html?id=${docSnap.id}'">View</button></td>
          </tr>
        `;
      });

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statActive").textContent = active;

      const tbody = document.getElementById("propTableBody");
      if (total === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">🏠 No properties added yet.<\/td><\/tr>';
      } else {
        tbody.innerHTML = tableHTML;
      }

      // Requests count
      try {
        const reqQuery = query(
          collection(db, "requests"),
          where("ownerId", "==", user.uid),
          where("status", "==", "pending")
        );
        const reqSnap = await getDocs(reqQuery);
        document.getElementById("statRequests").textContent = reqSnap.size;
      } catch (e) {
        console.error("Error loading requests:", e);
        document.getElementById("statRequests").textContent = "0";
      }
    }

    // Auth state listener
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "owner-login.html";
        return;
      }
      await loadDashboard();
    });

    // Logout function
    window.logout = async function() {
      if (confirm("Are you sure you want to logout?")) {
        await signOut(auth);
        window.location.href = "owner-login.html";
      }
    };

    // Attach logout button event
    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.logout();
    });
  </script>
</body>
</html>
