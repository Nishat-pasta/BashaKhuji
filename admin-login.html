<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | BashaKhuji</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex; align-items: center; justify-content: center;
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      position: relative; overflow: hidden;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 20, 10, 0.52);
      z-index: 0;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }
    .bg-glow {
      position: fixed; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(34,120,60,0.25) 0%, transparent 70%);
      top: -100px; right: -100px; border-radius: 50%;
      animation: glow 8s ease-in-out infinite; z-index: 1;
    }
    .bg-glow2 {
      position: fixed; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,180,50,0.15) 0%, transparent 70%);
      bottom: -80px; left: -80px; border-radius: 50%;
      animation: glow 10s ease-in-out infinite reverse; z-index: 1;
    }
    @keyframes glow {
      0%,100% { transform: scale(1) translate(0,0); }
      50% { transform: scale(1.1) translate(30px,-20px); }
    }
    .card {
      position: relative; z-index: 2;
      width: 100%; max-width: 420px;
      background: rgba(255, 252, 240, 0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.45);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .shield-wrap {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #2d7a3a, #52c46a);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px; color: #fff;
      box-shadow: 0 8px 32px rgba(45,122,58,0.45);
    }
    h2 { text-align: center; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 32px; }
    .warning-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,165,0,0.12);
      border: 1px solid rgba(255,165,0,0.3);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 24px; font-size: 12px; color: #fbbf24;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4); font-size: 14px;
    }
    input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 12px; font-size: 14px;
      font-family: 'Poppins', sans-serif; color: #fff;
      outline: none; transition: all 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus {
      border-color: #52c46a;
      background: rgba(82,196,106,0.12);
      box-shadow: 0 0 0 3px rgba(82,196,106,0.2);
    }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: rgba(255,255,255,0.4); font-size: 14px;
    }
    .eye-btn:hover { color: rgba(255,255,255,0.8); }
    .error-msg { font-size: 11px; color: #f87171; margin-top: 6px; display: none; }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2d7a3a, #52c46a);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 6px 24px rgba(45,122,58,0.4);
      transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px;
    }
    .btn-login::after {
      content: ''; position: absolute; top: -50%; left: -60%;
      width: 45%; height: 200%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-20deg); animation: shine 2.5s infinite;
    }
    @keyframes shine { 0%{left:-60%} 100%{left:130%} }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(45,122,58,0.55); }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.4); }
    .back-link a { color: #86efac; text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }
  </style>
  <script type="module">
    window.togglePass = function() {
  const inp = document.getElementById('adminPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-nmR9szA415d_qX16fbMX8-lDMa-zrU4",
    authDomain: "bashakhuji-503d1.firebaseapp.com",
    projectId: "bashakhuji-503d1",
    storageBucket: "bashakhuji-503d1.firebasestorage.app",
    messagingSenderId: "697249288857",
    appId: "1:697249288857:web:76987e2b2ab10f90005e08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.adminLogin = async function() {
    const user = document.getElementById('adminUser').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    const err  = document.getElementById('errMsg');

    if (!user || !pass) {
      err.textContent = '❌ Please fill in all fields.';
      err.style.display = 'block';
      return;
    }

    try {
      // Firebase দিয়ে login
      const userCred = await signInWithEmailAndPassword(auth, user, pass);

      // Check করো সে admin কিনা
      const adminDoc = await getDoc(doc(db, "admins", userCred.user.uid));
      if (adminDoc.exists()) {
        window.location.href = 'admin-dashboard.html';
      } else {
        err.textContent = '❌ You are not an authorized admin.';
        err.style.display = 'block';
      }
    } catch (e) {
      err.textContent = '❌ Invalid email or password.';
      err.style.display = 'block';
    }
  }
</script>
