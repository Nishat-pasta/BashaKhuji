<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Property Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family: 'Poppins', sans-serif; background:#f2f2f2; }

.login-overlay {
  position:fixed; top:0; left:0; width:100%; height:100vh;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(5px);
  display:flex; justify-content:center; align-items:center; z-index:999;
}
.login-popup {
  background:white; width:350px; padding:30px;
  border-radius:12px; text-align:center;
  animation: popup 0.3s ease;
}
@keyframes popup {
  from{ transform:scale(0.8); opacity:0;}
  to{ transform:scale(1); opacity:1;}
}
.popup-btn { padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
.register { background:#28a745; color:white; }
.cancel { background:#ddd; margin-right:10px; }

.details-container {
  max-width: 900px; margin: 40px auto; padding: 0 20px;
}

.image-slider {
  position: relative; background: #000;
  border-radius: 12px; overflow: hidden; margin-bottom: 30px;
}
.image-slider img {
  width: 100%; height: 420px; object-fit: cover; display: none;
}
.image-slider img.active { display: block; }
.slider-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.5); color: white; border: none;
  padding: 12px 18px; cursor: pointer; font-size: 20px; border-radius: 6px;
  z-index: 10;
}
.prev { left: 10px; }
.next { right: 10px; }

.thumbnail-strip {
  display: flex; gap: 8px; padding: 10px 12px;
  background: rgba(0,0,0,0.45); flex-wrap: wrap;
}
.thumbnail-strip img {
  width: 70px; height: 52px; object-fit: cover;
  border-radius: 6px; cursor: pointer;
  border: 2px solid transparent;
  opacity: 0.65; transition: opacity 0.2s, border-color 0.2s;
  display: block !important;
}
.thumbnail-strip img.active-thumb { border-color: #6366f1; opacity: 1; }

.photo-count-badge {
  position: absolute; bottom: 72px; right: 14px;
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 12px; padding: 3px 10px; border-radius: 20px;
  z-index: 10;
}

.info-card {
  background: white; border-radius: 12px;
  padding: 25px; margin-bottom: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}
.info-card h3 {
  font-size: 18px; margin-bottom: 20px;
  color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px;
}
.info-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
}
.info-item label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
.info-item span { font-size: 14px; font-weight: 600; color: #333; }
.badge-available {
  background: #d1fae5; color: #065f46;
  padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.badge-unavailable {
  background: #fee2e2; color: #991b1b;
  padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.price-text {
  font-size: 32px; font-weight: 700; color: #3f37c9;
}
.price-text span { font-size: 16px; color: #666; font-weight: 400; }
.summary-text { line-height: 1.8; color: #555; font-size: 15px; white-space: pre-line; }
.locked { color: #ef4444; font-size: 14px; }
.verified-banner {
  background: linear-gradient(135deg, #d1fae5, #a7f3d0);
  border: 1.5px solid #10b981;
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 15px;
  color: #065f46;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.action-buttons {
  display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;
}
.btn-contact {
  flex: 1; padding: 14px 20px;
  background: linear-gradient(135deg, #3f37c9, #6366f1);
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: 0.3s; box-shadow: 0 5px 18px rgba(63,55,201,0.35);
}
.btn-contact:hover { transform: translateY(-3px); filter: brightness(1.1); }
.btn-save {
  flex: 1; padding: 14px 20px; background: white; color: #333;
  border: 2px solid #ddd; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s;
}
.btn-save:hover { border-color: #e11d48; color: #e11d48; transform: translateY(-3px); }
.btn-save.saved { background: #fff0f3; border-color: #e11d48; color: #e11d48; }

.utility-tag {
  display: inline-block; background: #ede9fe; color: #4c1d95;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600; margin: 4px 4px 4px 0;
}

.owner-card { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.owner-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #3f37c9, #6366f1);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 24px; font-weight: 700; flex-shrink: 0;
}
.owner-details { flex: 1; }
.owner-name { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 4px; }
.owner-contact { font-size: 13px; color: #666; display: flex; flex-direction: column; gap: 2px; }
.owner-contact a { color: #3f37c9; text-decoration: none; font-weight: 600; }

/* ── Payment Required Box ── */
.payment-required-box {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1.5px solid #f59e0b;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.payment-required-box .lock-icon { font-size: 36px; margin-bottom: 8px; }
.payment-required-box h4 { margin: 0 0 6px; color: #92400e; font-size: 16px; }
.payment-required-box p { margin: 0 0 14px; color: #78350f; font-size: 13px; line-height: 1.6; }
.btn-pay {
  display: inline-block; padding: 12px 28px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  text-decoration: none; transition: 0.3s;
  box-shadow: 0 4px 14px rgba(245,158,11,0.4);
}
.btn-pay:hover { transform: translateY(-2px); filter: brightness(1.08); }

/* ── Payment Pending Box ── */
.payment-pending-box {
  background: linear-gradient(135deg, #eff6ff, #dbeafe);
  border: 1.5px solid #3b82f6;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.payment-pending-box h4 { margin: 0 0 6px; color: #1e40af; font-size: 16px; }
.payment-pending-box p { margin: 0; color: #1d4ed8; font-size: 13px; line-height: 1.6; }

/* ── Request Button ── */
.btn-request {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  margin-top: 16px; transition: 0.3s;
  box-shadow: 0 5px 18px rgba(16,185,129,0.35);
}
.btn-request:hover { transform: translateY(-2px); filter: brightness(1.08); }
.btn-request:disabled {
  background: #d1d5db; color: #9ca3af;
  cursor: not-allowed; box-shadow: none; transform: none;
}

#loadingSpinner {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; gap: 16px;
}
.spinner {
  width: 48px; height: 48px;
  border: 5px solid #e0e0e0; border-top-color: #3f37c9;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadingSpinner p { color: #666; font-size: 15px; margin: 0; }

#errorMessage {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; text-align: center; gap: 12px;
}
#errorMessage .error-icon { font-size: 56px; }
#errorMessage h2 { color: #ef4444; font-size: 22px; margin: 0; }
#errorMessage p { color: #666; font-size: 15px; margin: 0; }
#errorMessage a {
  margin-top: 8px; padding: 10px 24px;
  background: #3f37c9; color: white;
  border-radius: 8px; text-decoration: none;
  font-weight: 600; font-size: 14px;
}

/* Toast notification */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: white; padding: 12px 24px;
  border-radius: 10px; font-size: 14px; font-weight: 500;
  z-index: 9999; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>

<body>

<div id="loadingSpinner">
  <div class="spinner"></div>
  <p>Loading property details...</p>
</div>

<div id="errorMessage">
  <div class="error-icon">🏚️</div>
  <h2>Property Not Found</h2>
  <p id="errorText">The property you are looking for does not exist or the link is invalid.</p>
  <a href="properties.html">Browse All Properties</a>
</div>

<div id="propertyPage" style="display:none;">
  <div class="details-container">
    <div class="image-slider" id="imageSlider">
      <button class="slider-btn prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="slider-btn next" onclick="changeSlide(1)">&#10095;</button>
      <div class="photo-count-badge" id="photoCountBadge">1 / 1</div>
    </div>

    <div id="verifiedBadge"></div>
    <div class="info-card" id="basicInfo"></div>
    <div class="info-card" id="locationInfo"></div>
    <div class="info-card" id="summaryInfo"></div>
    <div class="info-card" id="utilitiesInfo"></div>
    <div class="info-card" id="priceInfo"></div>

    <!-- Owner Info — content injected by JS based on role/payment -->
    <div class="info-card" id="ownerInfo"></div>
  </div>
</div>

<!-- Login Popup -->
<div class="login-overlay" id="loginOverlay" style="display:none;">
  <div class="login-popup">
    <h3>Please Login / Register</h3>
    <p>Owner এর তথ্য দেখতে এবং payment করতে আগে login করুন।</p>
    <button class="popup-btn cancel" onclick="closePopup()">Close</button>
    <button class="popup-btn register" onclick="window.location.href='tenant-login.html'">Login / Register</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, serverTimestamp, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-nmR9szA415d_qX16fbMX8-lDMa-zrU4",
  authDomain: "bashakhuji-503d1.firebaseapp.com",
  projectId: "bashakhuji-503d1",
  storageBucket: "bashakhuji-503d1.firebasestorage.app",
  messagingSenderId: "697249288857",
  appId: "1:697249288857:web:76987e2b2ab10f90005e08"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const params     = new URLSearchParams(window.location.search);
const propertyId = params.get("id");

let currentProperty = null;

if (!propertyId) {
  showError("No property ID found in URL.");
} else {
  loadProperty(propertyId);
}

async function loadProperty(id) {
  try {
    const snap = await getDoc(doc(db, "properties", id));
    if (!snap.exists()) { showError("Property not found."); return; }

    const p = { id: snap.id, ...snap.data() };
    currentProperty = p;
    await updateSaveButtonUI();

    document.getElementById("loadingSpinner").style.display = "none";
    document.getElementById("propertyPage").style.display  = "block";

    buildGallery(p.photos || []);

    document.getElementById("verifiedBadge").innerHTML = `
      <div class="verified-banner">✅ This property is <strong>Verified</strong> by BashaKhuji</div>`;

    // Status badge — available or unavailable
    const statusBadge = p.status === "unavailable"
      ? `<span class="badge-unavailable">❌ Unavailable</span>`
      : `<span class="badge-available">✅ Available</span>`;

    document.getElementById("basicInfo").innerHTML = `
      <h3>📋 Basic Information</h3>
      <div class="info-grid">
        <div class="info-item"><label>Title</label><span>${p.title || "N/A"}</span></div>
        <div class="info-item"><label>Type</label><span>${p.type || "N/A"}</span></div>
        <div class="info-item"><label>Rooms</label><span>${p.rooms || "N/A"}</span></div>
        <div class="info-item"><label>Bathrooms</label><span>${p.bathrooms || "N/A"}</span></div>
        <div class="info-item"><label>Floor</label><span>${p.floor || "N/A"}</span></div>
        <div class="info-item"><label>Size</label><span>${p.sqft ? p.sqft + " sqft" : "N/A"}</span></div>
        <div class="info-item"><label>Furnishing</label><span>${p.furnish || "N/A"}</span></div>
        <div class="info-item"><label>Available From</label><span>${p.availDate || "N/A"}</span></div>
        <div class="info-item"><label>Status</label>${statusBadge}</div>
      </div>`;

    document.getElementById("locationInfo").innerHTML = `
      <h3>📍 Location</h3>
      <div class="info-grid">
        <div class="info-item"><label>Division</label><span>${p.division || "N/A"}</span></div>
        <div class="info-item"><label>District</label><span>${p.district || "N/A"}</span></div>
        <div class="info-item"><label>Area</label><span>${p.area || "N/A"}</span></div>
      </div>`;

    document.getElementById("summaryInfo").innerHTML = `
      <h3>📄 Description</h3>
      <p class="summary-text">${p.description || "No description."}</p>`;

    const utils = (p.utilities || []).map(u =>
      `<span class="utility-tag">${u}</span>`).join("") || "None";
    document.getElementById("utilitiesInfo").innerHTML = `
      <h3>⚡ Utilities</h3>${utils}`;

    document.getElementById("priceInfo").innerHTML = `
      <h3>💰 Price</h3>
      <div class="price-text">৳ ${Number(p.rent).toLocaleString()} <span>/ month</span></div>
      ${p.deposit ? `<p style="color:#666;margin-top:8px;">Deposit: ৳ ${Number(p.deposit).toLocaleString()}</p>` : ""}
      <div class="action-buttons">
        <button class="btn-save" id="saveBtn" onclick="toggleSave('${id}')">🤍 Save Property</button>
      </div>`;

    // Auth check → decide what to show in Owner Info section
    onAuthStateChanged(auth, async user => {
      if (!user) {
        // Not logged in
        renderOwnerLocked("not-logged-in", p);
        return;
      }
        await updateSaveButtonUI();

      // Get user role from Firestore
      const userSnap = await getDoc(doc(db, "users", user.uid));
      const role = userSnap.exists() ? userSnap.data().role : "tenant";

      // Admin or Owner of this property → always show
      if (role === "admin" || (role === "owner" && p.ownerId === user.uid)) {
        renderOwnerFull(p);
        return;
      }

     // Tenant → check payment status
const paymentId = `${user.uid}_${propertyId}`;
const paySnap = await getDoc(doc(db, "payments", paymentId));

if (!paySnap.exists()) {
  // No payment at all
  console.log("No payment found for:", paymentId);
  renderOwnerLocked("no-payment", p);
  return;
}

const payStatus = paySnap.data().status;
console.log("Payment status:", payStatus);
console.log("Property owner info:", { 
  ownerName: p.ownerName, 
  ownerPhone: p.ownerPhone, 
  ownerEmail: p.ownerEmail 
});

if (payStatus === "pending") {
  // Payment done, waiting for owner approval
  console.log("Payment is pending, showing waiting message");
  renderOwnerLocked("pending-approval", p);
  return;
}

if (payStatus === "approved") {
  // Payment approved → show owner info + request button
  console.log("✅ Payment approved! Showing owner info");
  renderOwnerFull(p, user.uid, true);
  return;
}

// Any other status (rejected etc.)
console.log("Payment rejected or other status");
renderOwnerLocked("no-payment", p);
    });

  } catch(err) {
    showError(err.message);
  }
}
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ── Show owner info fully (for admin/owner/approved tenant) ──────────────────
function renderOwnerFull(p, userId = null, showRequest = false) {
  let requestSection = "";

  if (showRequest && p.status !== "unavailable") {
    requestSection = `
      <button class="btn-request" id="requestBtn" onclick="sendRequest()">
        📩 Send Rental Request to Owner
      </button>`;
  } else if (p.status === "unavailable") {
    requestSection = `
      <button class="btn-request" disabled>
        ❌ This Property is No Longer Available
      </button>`;
  }

  // Get owner info - সরাসরি p থেকে নিচ্ছি
  const ownerName = p.ownerName || 'Not Available';
  const ownerPhone = p.ownerPhone || 'Not Available';
  const ownerEmail = p.ownerEmail || 'Not Available';
  const ownerAvatar = ownerName !== 'Not Available' ? ownerName.charAt(0).toUpperCase() : 'O';

  document.getElementById("ownerInfo").innerHTML = `
    <h3>👤 Owner / Agency Info</h3>
    <div class="owner-card">
      <div class="owner-avatar">${ownerAvatar}</div>
      <div class="owner-details">
        <div class="owner-name">${ownerName}</div>
        <div class="owner-contact">
          <a href="tel:${ownerPhone}">📞 ${ownerPhone}</a><br>
          <a href="mailto:${ownerEmail}">✉️ ${ownerEmail}</a>
        </div>
      </div>
      <a href="agency-details.html?ownerId=${p.ownerId || p.ownerUid}" 
         style="padding:10px 20px; background:#f0f0ff; color:#3f37c9; 
                border-radius:10px; font-weight:600; font-size:13px; text-decoration:none;">
        🏢 View Agency Details
      </a>
    </div>
    ${requestSection}`;
}
// ── Show locked states ───────────────────────────────────────────────────────
function renderOwnerLocked(reason, p) {
  let html = `<h3>👤 Owner / Agency Info</h3>`;

  if (reason === "not-logged-in") {
    html += `
      <div class="payment-required-box">
        <div class="lock-icon">🔒</div>
        <h4>Login করুন</h4>
        <p>Owner এর তথ্য দেখতে এবং payment করতে আগে login করতে হবে।</p>
        <button class="btn-pay" onclick="window.location.href='tenant-login.html'">
          Login / Register
        </button>
      </div>`;
  } else if (reason === "no-payment") {
    html += `
      <div class="payment-required-box">
        <div class="lock-icon">💳</div>
        <h4>Payment করুন — Owner এর Contact দেখুন</h4>
        <p>
          এই property এর Owner এর phone number, email এবং agency details 
          দেখতে একটি ছোট fee payment করতে হবে।<br>
          Payment করলে Owner আপনার request approve করতে পারবেন।
        </p>
        <button class="btn-pay" onclick="goToPayment()">
          💳 Payment করুন
        </button>
      </div>`;
  } else if (reason === "pending-approval") {
    html += `
      <div class="payment-pending-box">
        <h4>⏳ Payment Received — Approval Pending</h4>
        <p>
          আপনার payment পাওয়া গেছে। Owner এখন আপনার payment approve করলেই 
          Owner এর contact number এবং agency details দেখতে পাবেন।<br><br>
          <strong>সাধারণত ১-২৪ ঘণ্টার মধ্যে approve হয়।</strong>
        </p>
      </div>`;
  }

  document.getElementById("ownerInfo").innerHTML = html;
}

// ── Go to payment page ───────────────────────────────────────────────────────
window.goToPayment = function() {
  window.location.href = `agency-details.html?propertyId=${propertyId}`;
};

// ── Send rental request ──────────────────────────────────────────────────────
window.sendRequest = async function() {
  const user = auth.currentUser;
  if (!user || !currentProperty) return;

  const btn = document.getElementById("requestBtn");
  btn.disabled = true;
  btn.textContent = "⏳ Sending...";

  try {
    // Check if request already sent
    const reqId = `${user.uid}_${propertyId}`;
    const existing = await getDoc(doc(db, "requests", reqId));

    if (existing.exists()) {
      showToast("✅ আপনি আগেই এই property তে request পাঠিয়েছেন!");
      btn.textContent = "✅ Request Already Sent";
      return;
    }

    // Save request to Firestore
    await setDoc(doc(db, "requests", reqId), {
      tenantId:    user.uid,
      tenantEmail: user.email,
      tenantName:  user.displayName || user.email,
      propertyId:  propertyId,
      propertyTitle: currentProperty.title || "",
      ownerId: currentProperty.ownerUid,   
      status:      "pending",
      createdAt:   serverTimestamp()
    });

    showToast("✅ Request সফলভাবে পাঠানো হয়েছে! Owner এর সাথে যোগাযোগ করুন।");
    btn.textContent = "✅ Request Sent!";
    btn.style.background = "#6b7280";

  } catch (err) {
    showToast("❌ Error: " + err.message);
    btn.disabled = false;
    btn.textContent = "📩 Send Rental Request to Owner";
  }
};

// ── Gallery builder ──────────────────────────────────────────────────────────
function buildGallery(photos) {
  const slider = document.getElementById("imageSlider");
  const defaultImg = "images/default-property.jpg";

  if (!photos || photos.length === 0) {
    slider.innerHTML += `<img src="${defaultImg}" class="active">`;
    return;
  }

  let slideHTML = "";
  let thumbHTML = `<div class="thumbnail-strip">`;
  photos.forEach((src, i) => {
    slideHTML += `<img src="${src}" class="${i===0?'active':''}" onerror="this.src='${defaultImg}'">`;
    thumbHTML += `<img src="${src}" class="${i===0?'active-thumb':''}" onclick="goSlide(${i})" onerror="this.src='${defaultImg}'">`;
  });
  thumbHTML += `</div>`;

  const nextBtn = slider.querySelector(".next");
  nextBtn.insertAdjacentHTML("afterend", slideHTML + thumbHTML);
  document.getElementById("photoCountBadge").textContent = `1 / ${photos.length}`;

  let cur = 0;
  window.changeSlide = function(dir) { goSlide((cur + dir + photos.length) % photos.length); };
  window.goSlide = function(n) {
    const imgs   = slider.querySelectorAll("img");
    const thumbs = slider.querySelectorAll(".thumbnail-strip img");
    imgs[cur].classList.remove("active");
    if(thumbs[cur]) thumbs[cur].classList.remove("active-thumb");
    cur = n;
    imgs[cur].classList.add("active");
    if(thumbs[cur]) thumbs[cur].classList.add("active-thumb");
    document.getElementById("photoCountBadge").textContent = `${cur+1} / ${photos.length}`;
  };
}

// ========== SAVED PROPERTY FUNCTIONS (Firebase) ==========
// Check if property is saved by current tenant
async function isPropertySaved(propertyId) {
  const user = auth.currentUser;
  if (!user) return false;
  
  try {
    const savedRef = doc(db, "users", user.uid, "savedProperties", propertyId);
    const snap = await getDoc(savedRef);
    return snap.exists();
  } catch (error) {
    console.error("Error checking saved status:", error);
    return false;
  }
}

// Save property to Firebase
async function saveProperty(propertyId) {
  const user = auth.currentUser;
  if (!user) {
    showToast("🔐 Please login to save properties!", "error");
    return false;
  }
  
  try {
    const savedRef = doc(db, "users", user.uid, "savedProperties", propertyId);
    await setDoc(savedRef, {
      propertyId: propertyId,
      savedAt: serverTimestamp(),
      propertyData: currentProperty  // Store property data for quick access
    });
    return true;
  } catch (error) {
    console.error("Error saving property:", error);
    showToast("❌ Failed to save property!", "error");
    return false;
  }
}

// Unsave property from Firebase
async function unsaveProperty(propertyId) {
  const user = auth.currentUser;
  if (!user) return false;
  
  try {
    const savedRef = doc(db, "users", user.uid, "savedProperties", propertyId);
    await deleteDoc(savedRef);
    return true;
  } catch (error) {
    console.error("Error unsaving property:", error);
    showToast("❌ Failed to remove from saved!", "error");
    return false;
  }
}

// Toggle save/unsave
window.toggleSave = async function(propertyId) {
  const btn = document.getElementById("saveBtn");
  if (!btn) return;
  
  // Check if user is logged in
  const user = auth.currentUser;
  if (!user) {
    showToast("🔐 Please login to save properties!", "error");
    return;
  }
  
  // Disable button while processing
  btn.disabled = true;
  const originalText = btn.innerHTML;
  btn.innerHTML = "⏳ Loading...";
  
  try {
    const saved = await isPropertySaved(propertyId);
    
    if (saved) {
      // Unsave
      await unsaveProperty(propertyId);
      btn.innerHTML = "🤍 Save Property";
      btn.classList.remove("saved");
      showToast("✅ Removed from saved properties!", "success");
    } else {
      // Save
      await saveProperty(propertyId);
      btn.innerHTML = "❤️ Saved!";
      btn.classList.add("saved");
      showToast("✅ Property saved successfully!", "success");
    }
  } catch (error) {
    console.error("Toggle save error:", error);
    btn.innerHTML = originalText;
    showToast("❌ Something went wrong!", "error");
  } finally {
    btn.disabled = false;
  }
};

// Update save button UI on page load
async function updateSaveButtonUI() {
  const btn = document.getElementById("saveBtn");
  if (!btn || !currentProperty) return;
  
  const user = auth.currentUser;
  if (!user) {
    btn.innerHTML = "🤍 Save Property";
    btn.classList.remove("saved");
    return;
  }
  
  const saved = await isPropertySaved(currentProperty.id);
  if (saved) {
    btn.innerHTML = "❤️ Saved!";
    btn.classList.add("saved");
  } else {
    btn.innerHTML = "🤍 Save Property";
    btn.classList.remove("saved");
  }
}
